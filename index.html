<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LANTERRA — Night of Ten Thousand Lights</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏮</text></svg>" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #070310;
    --cream: #f2e6d5;
    --amber: #ffb45e;
    --dim: rgba(242, 230, 213, 0.55);
    --ease: cubic-bezier(0.76, 0, 0.24, 1);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: auto; }
  html, body { background: var(--bg); }
  body {
    font-family: "Inter", system-ui, sans-serif;
    color: var(--cream);
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }
  ::selection { background: rgba(255, 180, 94, 0.35); }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: rgba(242, 230, 213, 0.2); }

  /* ---------- canvas ---------- */
  #stage {
    position: fixed;
    inset: 0;
    z-index: 0;
    opacity: 0;
    transition: opacity 1.6s ease 0.2s;
  }
  body.ready #stage { opacity: 1; }

  /* ---------- film grain + vignette ---------- */
  .grain {
    position: fixed; inset: -50%;
    z-index: 3; pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 300 300' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.72' numOctaves='2' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    opacity: 0.05;
    animation: grain 0.9s steps(4) infinite;
  }
  @keyframes grain {
    0% { transform: translate(0, 0); }
    25% { transform: translate(-2%, 3%); }
    50% { transform: translate(3%, -2%); }
    75% { transform: translate(-3%, -3%); }
    100% { transform: translate(2%, 2%); }
  }
  .vignette {
    position: fixed; inset: 0;
    z-index: 2; pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 52%, rgba(4, 1, 12, 0.55) 100%);
  }

  /* ---------- preloader ---------- */
  #preloader {
    position: fixed; inset: 0;
    z-index: 50;
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 1.2rem;
    transition: transform 1.1s var(--ease);
  }
  body.ready #preloader { transform: translateY(-101%); }
  #preloader .pl-brand {
    font-size: 0.7rem; letter-spacing: 0.55em;
    text-transform: uppercase; color: var(--dim);
  }
  #pl-count {
    font-family: "Fraunces", serif;
    font-style: italic; font-weight: 300;
    font-size: clamp(4rem, 14vw, 9rem);
    line-height: 1;
    color: var(--cream);
    font-variant-numeric: tabular-nums;
  }
  #preloader .pl-line {
    width: min(320px, 60vw); height: 1px;
    background: rgba(242, 230, 213, 0.15);
    position: relative; overflow: hidden;
  }
  #preloader .pl-line i {
    position: absolute; inset: 0;
    background: var(--amber);
    transform-origin: left;
    transform: scaleX(0);
  }

  /* ---------- fixed UI chrome ---------- */
  .ui { position: fixed; z-index: 10; }
  nav.ui {
    top: 0; left: 0; right: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 1.6rem 2.2rem;
    mix-blend-mode: difference;
  }
  .nav-brand {
    font-family: "Fraunces", serif;
    font-weight: 500; font-size: 1.05rem;
    letter-spacing: 0.28em;
    color: var(--cream); text-decoration: none;
  }
  .nav-links { display: flex; gap: 2rem; }
  .nav-links a {
    font-size: 0.68rem; letter-spacing: 0.24em;
    text-transform: uppercase;
    color: var(--dim); text-decoration: none;
    transition: color 0.3s;
  }
  .nav-links a:hover { color: var(--cream); }

  .rail {
    right: 2.2rem; top: 50%;
    transform: translateY(-50%);
    display: flex; flex-direction: column; align-items: center; gap: 0.9rem;
  }
  .rail .rail-idx {
    font-size: 0.62rem; letter-spacing: 0.2em;
    color: var(--dim); writing-mode: vertical-rl;
    font-variant-numeric: tabular-nums;
  }
  .rail .rail-track {
    width: 1px; height: 26vh;
    background: rgba(242, 230, 213, 0.14);
    position: relative;
  }
  .rail .rail-dot {
    position: absolute; left: 50%; top: 0;
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--amber);
    transform: translate(-50%, -50%);
    box-shadow: 0 0 12px 2px rgba(255, 180, 94, 0.6);
  }

  .scroll-badge {
    left: 2.2rem; bottom: 2rem;
    width: 96px; height: 96px;
    opacity: 1; transition: opacity 0.6s;
  }
  .scroll-badge.hide { opacity: 0; }
  .scroll-badge svg { width: 100%; height: 100%; overflow: visible; animation: spin 14s linear infinite; }
  .scroll-badge text {
    font-size: 9.5px; letter-spacing: 0.32em;
    fill: var(--dim); text-transform: uppercase;
    font-family: "Inter", sans-serif;
  }
  .scroll-badge .badge-arrow {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    color: var(--amber); font-size: 1rem;
    animation: bob 2.2s ease-in-out infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes bob { 0%, 100% { transform: translateY(-2px); } 50% { transform: translateY(3px); } }

  /* ---------- sections ---------- */
  .sections { position: fixed; inset: 0; z-index: 5; pointer-events: none; }
  .section {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    justify-content: center;
    padding: 0 clamp(1.4rem, 6vw, 6rem);
    opacity: 0;
    visibility: hidden;
  }
  .section .kicker {
    font-size: 0.66rem; letter-spacing: 0.5em;
    text-transform: uppercase; color: var(--amber);
    margin-bottom: 1.1rem;
  }
  .section h2 {
    font-family: "Fraunces", serif;
    font-weight: 300;
    font-size: clamp(2.4rem, 7vw, 5.6rem);
    line-height: 1.02;
    letter-spacing: 0.01em;
    max-width: 12ch;
  }
  .section h2 em { font-style: italic; color: var(--amber); }
  .section p {
    margin-top: 1.4rem;
    max-width: 42ch;
    font-weight: 300;
    font-size: clamp(0.86rem, 1.4vw, 1.02rem);
    line-height: 1.75;
    color: var(--dim);
  }
  .section.right { align-items: flex-end; text-align: right; }
  .section.right h2 { max-width: 14ch; }

  /* hero */
  #s-hero { align-items: center; text-align: center; justify-content: center; }
  #s-hero .hero-title {
    font-family: "Fraunces", serif;
    font-weight: 300;
    font-size: clamp(3.4rem, 13.5vw, 12rem);
    line-height: 0.95;
    letter-spacing: 0.06em;
    display: flex; overflow: hidden;
  }
  #s-hero .hero-title span {
    display: inline-block;
    transform: translateY(115%) rotate(4deg);
    transition: transform 1.1s var(--ease);
  }
  body.ready #s-hero .hero-title span { transform: translateY(0) rotate(0); }
  #s-hero .hero-sub {
    margin-top: 1.6rem;
    font-size: 0.72rem; letter-spacing: 0.5em;
    text-transform: uppercase; color: var(--dim);
    opacity: 0; transition: opacity 1.2s ease 0.9s;
  }
  body.ready #s-hero .hero-sub { opacity: 1; }

  /* CTA */
  #s-cta { align-items: center; text-align: center; justify-content: center; }
  .cta-btn {
    pointer-events: auto;
    margin-top: 2.4rem;
    display: inline-flex; align-items: center; gap: 0.9rem;
    padding: 1.05rem 2.6rem;
    border: 1px solid rgba(255, 180, 94, 0.45);
    border-radius: 99px;
    color: var(--cream); text-decoration: none;
    font-size: 0.72rem; letter-spacing: 0.34em; text-transform: uppercase;
    position: relative; overflow: hidden;
    transition: color 0.4s, border-color 0.4s;
  }
  .cta-btn::before {
    content: "";
    position: absolute; inset: 0;
    background: var(--amber);
    transform: translateY(101%);
    transition: transform 0.5s var(--ease);
    z-index: -1;
  }
  .cta-btn:hover { color: #1c0d02; border-color: var(--amber); }
  .cta-btn:hover::before { transform: translateY(0); }
  .cta-foot {
    position: absolute; bottom: 2rem; left: 0; right: 0;
    display: flex; justify-content: center; gap: 2.4rem;
    font-size: 0.62rem; letter-spacing: 0.22em;
    text-transform: uppercase; color: rgba(242, 230, 213, 0.35);
  }

  /* ---------- cursor ---------- */
  #cursor-dot, #cursor-ring {
    position: fixed; top: 0; left: 0;
    z-index: 60; pointer-events: none;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    display: none;
  }
  #cursor-dot { width: 6px; height: 6px; background: var(--amber); }
  #cursor-ring {
    width: 34px; height: 34px;
    border: 1px solid rgba(242, 230, 213, 0.35);
    transition: width 0.3s, height 0.3s, border-color 0.3s;
  }
  body.cursor-hover #cursor-ring {
    width: 56px; height: 56px;
    border-color: var(--amber);
  }
  @media (hover: hover) and (pointer: fine) {
    #cursor-dot, #cursor-ring { display: block; }
    body { cursor: none; }
    a, button { cursor: none; }
  }

  .scroll-space { position: relative; z-index: -1; height: 1300vh; }

  /* ---------- locked heart gate ---------- */
  #gate {
    position: fixed; inset: 0; z-index: 70;
    display: flex; align-items: center; justify-content: center;
    background: radial-gradient(ellipse at center, #1a0a18 0%, #06030b 70%);
    opacity: 0; visibility: hidden;
    transition: opacity 0.9s ease;
  }
  body.gated #gate { opacity: 1; visibility: visible; }
  body.gated { cursor: auto; }
  body.gated #cursor-dot, body.gated #cursor-ring { display: none; }
  #gate * { cursor: auto; }
  #gate-go, #gate label { cursor: pointer; }

  #gate { flex-direction: column; gap: clamp(0.8rem, 2vh, 1.6rem); }

  /* ---- pixel heart, big enough to own the screen ---- */
  .heart-stage {
    position: relative;
    width: min(94vw, 82vh * 16 / 14);
    aspect-ratio: 16 / 14;
    /* everything inside sizes off the heart itself, not the viewport */
    container-type: size;
    container-name: heart;
    filter:
      drop-shadow(0 0 14px rgba(255, 90, 150, 0.55))
      drop-shadow(0 0 60px rgba(255, 50, 130, 0.4))
      drop-shadow(0 0 130px rgba(255, 40, 120, 0.25));
    animation: beat 2.1s ease-in-out infinite;
  }
  @keyframes beat {
    0%, 100% { transform: scale(1); }
    10% { transform: scale(1.035); }
    20% { transform: scale(1); }
    30% { transform: scale(1.02); }
  }
  #heart-px { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
  #heart-px rect {
    transition: transform 0.85s cubic-bezier(0.5, 0, 0.75, 0), opacity 0.7s ease 0.15s;
  }

  /* ---- numpad nested inside the heart ---- */
  /* 45% wide, centred at 43% — the largest block that sits inside the
     heart's actual pixel silhouette (rows 2-9, cols 3-12), not just its box */
  .pad-wrap {
    position: absolute;
    left: 50%; top: 43%;
    transform: translate(-50%, -50%);
    width: 45%;
    display: flex; flex-direction: column;
    gap: 2.2cqw;
    transition: opacity 0.4s ease, transform 0.5s ease;
  }
  .code-slots {
    display: flex; justify-content: center;
    gap: 1.5cqw;
  }
  .code-slots i {
    width: 2.6cqw;
    aspect-ratio: 1;
    background: rgba(120, 20, 55, 0.42);
    box-shadow: inset 0 0 0 2px rgba(255, 220, 235, 0.22);
    transition: background 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
  }
  .code-slots i.on {
    background: #fff2f8;
    box-shadow: 0 0 10px #ffd0e8, 0 0 22px rgba(255, 140, 200, 0.9);
    transform: scale(1.16);
  }
  .numpad {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-auto-rows: 1fr;
    gap: 1.1cqw;
  }
  .key {
    position: relative;
    aspect-ratio: 1;
    border: 0;
    border-radius: 22%;
    font-family: "Inter", system-ui, sans-serif;
    font-weight: 500;
    font-size: 1rem;   /* fallback if container units are unsupported */
    font-size: 4.4cqw;
    color: #a8548b;
    background: linear-gradient(#fffdfa 0%, #fdf3f7 52%, #eddfea 100%);
    box-shadow:
      inset 0 2px 0 rgba(255, 255, 255, 0.95),
      inset 0 -3px 0 rgba(196, 168, 190, 0.45),
      0 3px 0 rgba(150, 110, 140, 0.35),
      0 5px 9px rgba(80, 20, 55, 0.3);
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.08s ease, box-shadow 0.08s ease, filter 0.15s ease;
    user-select: none;
  }
  .key:hover { filter: brightness(1.06); }
  .key:active, .key.hit {
    transform: translateY(3px);
    box-shadow:
      inset 0 2px 0 rgba(255, 255, 255, 0.9),
      inset 0 -1px 0 rgba(196, 168, 190, 0.4),
      0 0 0 rgba(150, 110, 140, 0.35),
      0 1px 4px rgba(80, 20, 55, 0.35);
  }
  .key .charm {
    position: absolute; right: 11%; bottom: 8%;
    font-size: 0.52em; font-style: normal;
    color: #e88ab8; opacity: 0.85;
  }
  .key-fn { color: #c479a6; background: linear-gradient(#fffdfa 0%, #fbeef4 52%, #e7d5e4 100%); }
  .key-zero { grid-column: span 2; aspect-ratio: auto; }
  .key-go {
    grid-row: span 2;
    aspect-ratio: auto;
    color: #fff4f9;
    font-size: 5.8cqw;
    background: linear-gradient(#ff7ab8 0%, #f4569f 55%, #d63b81 100%);
    box-shadow:
      inset 0 2px 0 rgba(255, 255, 255, 0.55),
      inset 0 -3px 0 rgba(150, 30, 85, 0.5),
      0 3px 0 rgba(130, 25, 75, 0.5),
      0 5px 12px rgba(120, 10, 60, 0.45);
  }

  #gate-hint {
    font-size: clamp(0.52rem, 1.3vw, 0.66rem);
    letter-spacing: 0.3em; text-transform: uppercase;
    color: rgba(255, 200, 230, 0.5);
    transition: color 0.3s;
  }
  body.gate-wrong .heart-stage { animation: shake 0.5s ease; }
  body.gate-wrong #gate-hint { color: #ff7ab4; }
  body.gate-wrong .code-slots i { background: rgba(220, 40, 90, 0.65); }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-13px) rotate(-1.2deg); }
    40% { transform: translateX(12px) rotate(1.2deg); }
    60% { transform: translateX(-8px) rotate(-0.6deg); }
    80% { transform: translateX(5px); }
  }

  /* opening — the heart bursts apart into its own pixels */
  body.opening .heart-stage { animation: none; }
  body.opening .pad-wrap { opacity: 0; transform: translate(-50%, -50%) scale(0.86); }
  body.opening #gate-hint { opacity: 0; }
  body.opening #heart-px rect { opacity: 0; }

  @media (prefers-reduced-motion: reduce) {
    .heart-stage { animation: none; }
  }

  /* the flash that swallows the screen */
  #flash {
    position: fixed; inset: 0; z-index: 80;
    background: #fff;
    opacity: 0; pointer-events: none;
  }
  #flash.blast { animation: blast 2.1s ease-out forwards; }
  @keyframes blast {
    0% { opacity: 0; }
    14% { opacity: 1; }
    30% { opacity: 1; }
    100% { opacity: 0; }
  }
  @media (prefers-reduced-motion: reduce) {
    body.gated .heart-stage { animation: none; }
    #flash.blast { animation: blastSoft 1.4s ease-out forwards; }
    @keyframes blastSoft { 0% { opacity: 0; } 30% { opacity: 0.45; } 100% { opacity: 0; } }
  }

  /* birthday message — rides in with the fireworks */
  .birthday {
    position: fixed;
    left: 50%; top: 15%;
    transform: translate(-50%, 26px) scale(0.94);
    z-index: 12;
    pointer-events: none;
    white-space: nowrap;
    font-family: "Fraunces", serif;
    font-weight: 600;
    font-style: italic;
    font-size: clamp(1.05rem, 6.2vw, 4.4rem);
    letter-spacing: 0.1em;
    color: #fff0f8;
    text-shadow:
      0 0 6px #ffb3de,
      0 0 16px #ff74c4,
      0 0 34px #ff3fae,
      0 0 68px rgba(255, 47, 166, 0.85),
      0 0 120px rgba(255, 47, 166, 0.5);
    opacity: 0;
    transition: opacity 1.2s ease, transform 1.2s cubic-bezier(0.2, 0.8, 0.2, 1);
  }
  body.celebrate .birthday {
    opacity: 1;
    transform: translate(-50%, 0) scale(1);
    animation: bdayGlow 3.2s ease-in-out infinite;
  }
  @keyframes bdayGlow {
    0%, 100% {
      text-shadow:
        0 0 6px #ffb3de, 0 0 16px #ff74c4, 0 0 34px #ff3fae,
        0 0 68px rgba(255, 47, 166, 0.85), 0 0 120px rgba(255, 47, 166, 0.5);
    }
    50% {
      text-shadow:
        0 0 8px #ffd0ea, 0 0 22px #ff8ccf, 0 0 48px #ff5cbb,
        0 0 96px rgba(255, 60, 175, 0.95), 0 0 160px rgba(255, 60, 175, 0.6);
    }
  }
  @media (prefers-reduced-motion: reduce) {
    body.celebrate .birthday { animation: none; }
  }

  /* nothing overlays the cake while it is being cut */
  body.cutting .sections,
  body.cutting nav.ui,
  body.cutting .rail,
  body.cutting .scroll-badge {
    opacity: 0;
    transition: opacity 0.5s ease;
    pointer-events: none;
  }

  @media (max-width: 720px) {
    nav.ui { padding: 1.2rem 1.3rem; }
    .nav-links { gap: 1.1rem; }
    .rail { right: 1rem; }
    .scroll-badge { left: 1.2rem; bottom: 1.2rem; width: 74px; height: 74px; }
    .cta-foot { gap: 1.1rem; flex-wrap: wrap; padding: 0 1rem; }
  }
  @media (prefers-reduced-motion: reduce) {
    .grain, .scroll-badge svg, .badge-arrow { animation: none; }
  }
</style>
</head>
<body>

<!-- preloader -->
<div id="preloader" aria-hidden="true">
  <div class="pl-brand">Lanterra</div>
  <div id="pl-count">00</div>
  <div class="pl-line"><i id="pl-bar"></i></div>
</div>

<!-- 3D stage -->
<canvas id="stage"></canvas>
<div class="vignette"></div>
<div class="grain"></div>

<!-- chrome -->
<nav class="ui">
  <a class="nav-brand" href="#" id="brand">LANTERRA</a>
  <div class="nav-links">
    <a href="#" data-scramble>Festival</a>
    <a href="#" data-scramble>The Water</a>
    <a href="#" data-scramble>Contact</a>
  </div>
</nav>

<div class="ui rail">
  <div class="rail-idx" id="rail-idx">01 / 02</div>
  <div class="rail-track"><div class="rail-dot" id="rail-dot"></div></div>
</div>

<div class="ui scroll-badge" id="scroll-badge">
  <svg viewBox="0 0 100 100">
    <defs>
      <path id="circlePath" d="M 50,50 m -38,0 a 38,38 0 1,1 76,0 a 38,38 0 1,1 -76,0" />
    </defs>
    <text><textPath href="#circlePath">scroll to drift &#183; scroll to drift &#183;</textPath></text>
  </svg>
  <div class="badge-arrow">&#8595;</div>
</div>

<!-- narrative sections -->
<div class="sections">
  <section class="section" id="s-hero">
    <div class="hero-title" aria-label="LANTERRA">
      <span>L</span><span>A</span><span>N</span><span>T</span><span>E</span><span>R</span><span>R</span><span>A</span>
    </div>
    <div class="hero-sub">A night of ten thousand lights</div>
  </section>

  <section class="section" id="s-cta">
    <a class="cta-btn" href="#" id="cta"><span>Reserve a lantern</span> &#8594;</a>
    <div class="cta-foot">
      <span>Lanterra &copy; 2026</span>
      <span>Crafted in WebGL &middot; Three.js</span>
      <span>Sound off &middot; Lights on</span>
    </div>
  </section>
</div>

<!-- locked heart: the way in -->
<div id="gate">
  <div class="heart-stage">
    <svg id="heart-px" viewBox="0 0 16 14" shape-rendering="crispEdges" aria-hidden="true"></svg>
    <div class="pad-wrap">
      <div class="code-slots" id="code-slots" role="status" aria-label="passcode"></div>
      <div class="numpad" id="numpad">
        <button class="key" data-k="7">7</button>
        <button class="key" data-k="8">8</button>
        <button class="key" data-k="9">9<i class="charm">✿</i></button>
        <button class="key key-fn" data-k="del" aria-label="delete">⌫</button>

        <button class="key" data-k="4">4</button>
        <button class="key" data-k="5">5</button>
        <button class="key" data-k="6">6</button>
        <button class="key key-go" data-k="go" aria-label="open">♥</button>

        <button class="key" data-k="1">1<i class="charm">★</i></button>
        <button class="key" data-k="2">2</button>
        <button class="key" data-k="3">3</button>

        <button class="key key-zero" data-k="0">0</button>
        <button class="key key-fn" data-k="clr" aria-label="clear">✕</button>
      </div>
    </div>
  </div>
  <div id="gate-hint">only you know it</div>
</div>
<div id="flash"></div>

<div class="birthday" id="birthday">HAPPY BIRTHDAY BABY</div>

<!-- cursor -->
<div id="cursor-dot"></div>

<script type="module">
import * as THREE from "three";
import { EffectComposer } from "three/addons/postprocessing/EffectComposer.js";
import { RenderPass } from "three/addons/postprocessing/RenderPass.js";
import { UnrealBloomPass } from "three/addons/postprocessing/UnrealBloomPass.js";
import { OutputPass } from "three/addons/postprocessing/OutputPass.js";
import { Reflector } from "three/addons/objects/Reflector.js";

/* ============================================================
   LANTERRA — scroll-driven lantern night
   All geometry procedural. No external assets.
   ============================================================ */

history.scrollRestoration = "manual";
window.scrollTo(0, 0);
window.addEventListener("load", () => window.scrollTo(0, 0));
window.addEventListener("pageshow", () => window.scrollTo(0, 0));
document.querySelectorAll('a[href="#"]').forEach((a) =>
  a.addEventListener("click", (e) => e.preventDefault())
);

const FOG_COLOR = new THREE.Color(0x120b26);
const FOG_DENSITY = 0.016;
const FIELD_HEIGHT = 26;

const canvas = document.getElementById("stage");
const renderer = new THREE.WebGLRenderer({
  canvas,
  antialias: true,
  powerPreference: "high-performance",
});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x070310, 1);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.85;

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(FOG_COLOR.getHex(), FOG_DENSITY);

const camera = new THREE.PerspectiveCamera(
  55, window.innerWidth / window.innerHeight, 0.1, 900
);
camera.position.set(0, 8.5, 24);
camera.layers.enable(1); // layer 1 = particles skipped by the water reflection pass

/* ---------------- sky dome ---------------- */
const skyMat = new THREE.ShaderMaterial({
  side: THREE.DoubleSide,
  depthWrite: false,
  fog: false,
  uniforms: { time: { value: 0 } },
  vertexShader: /* glsl */ `
    varying vec3 vDir;
    void main() {
      vDir = normalize(position);
      vec4 mv = modelViewMatrix * vec4(position, 1.0);
      gl_Position = projectionMatrix * mv;
    }
  `,
  fragmentShader: /* glsl */ `
    uniform float time;
    varying vec3 vDir;
    float hash(vec2 p) { p = fract(p * vec2(123.34, 456.21)); p += dot(p, p + 45.32); return fract(p.x * p.y); }
    float noise(vec2 p) {
      vec2 i = floor(p), f = fract(p);
      vec2 u = f * f * (3.0 - 2.0 * f);
      return mix(mix(hash(i), hash(i + vec2(1.0, 0.0)), u.x),
                 mix(hash(i + vec2(0.0, 1.0)), hash(i + vec2(1.0, 1.0)), u.x), u.y);
    }
    void main() {
      float h = clamp(vDir.y, 0.0, 1.0);
      vec3 horizon = vec3(0.165, 0.086, 0.25);
      vec3 mid     = vec3(0.078, 0.043, 0.18);
      vec3 zenith  = vec3(0.016, 0.010, 0.055);
      vec3 col = mix(horizon, mid, smoothstep(0.0, 0.25, h));
      col = mix(col, zenith, smoothstep(0.2, 0.75, h));
      // nebula wash
      float n = noise(vDir.xz * 3.0 + vDir.y * 2.0 + time * 0.008);
      col += vec3(0.10, 0.045, 0.14) * n * smoothstep(0.05, 0.5, h) * 0.5;
      // moon
      vec3 moonDir = normalize(vec3(-0.42, 0.48, -0.62));
      float m = max(dot(normalize(vDir), moonDir), 0.0);
      col += vec3(0.75, 0.78, 0.95) * pow(m, 900.0) * 1.6;   // disc
      col += vec3(0.35, 0.36, 0.55) * pow(m, 24.0) * 0.16;   // halo
      gl_FragColor = vec4(col, 1.0);
    }
  `,
});
const sky = new THREE.Mesh(new THREE.SphereGeometry(420, 64, 40), skyMat);
scene.add(sky);

/* ---------------- stars ---------------- */
function makeStars(count) {
  const pos = new Float32Array(count * 3);
  const size = new Float32Array(count);
  const phase = new Float32Array(count);
  for (let i = 0; i < count; i++) {
    const theta = Math.random() * Math.PI * 2;
    const y = 0.12 + Math.random() * 0.88; // upper dome
    const r = Math.sqrt(1 - y * y);
    const R = 390;
    pos[i * 3] = Math.cos(theta) * r * R;
    pos[i * 3 + 1] = y * R;
    pos[i * 3 + 2] = Math.sin(theta) * r * R;
    size[i] = 1.2 + Math.random() * 2.6;
    phase[i] = Math.random() * Math.PI * 2;
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute("position", new THREE.BufferAttribute(pos, 3));
  geo.setAttribute("aSize", new THREE.BufferAttribute(size, 1));
  geo.setAttribute("aPhase", new THREE.BufferAttribute(phase, 1));
  const mat = new THREE.ShaderMaterial({
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
    uniforms: { time: { value: 0 } },
    vertexShader: /* glsl */ `
      uniform float time;
      attribute float aSize;
      attribute float aPhase;
      varying float vA;
      void main() {
        vec4 mv = modelViewMatrix * vec4(position, 1.0);
        float tw = 0.55 + 0.45 * sin(time * 1.4 + aPhase);
        vA = tw;
        gl_PointSize = min(aSize * (0.7 + 0.3 * tw) * (320.0 / -mv.z), 8.0);
        gl_Position = projectionMatrix * mv;
      }
    `,
    fragmentShader: /* glsl */ `
      varying float vA;
      void main() {
        vec2 c = gl_PointCoord - 0.5;
        float a = smoothstep(0.5, 0.05, length(c));
        gl_FragColor = vec4(vec3(0.82, 0.85, 1.0), a * a * vA * 0.85);
      }
    `,
  });
  const pts = new THREE.Points(geo, mat);
  pts.frustumCulled = false;
  return { pts, mat };
}
const stars = makeStars(1300);
stars.pts.layers.set(1);
scene.add(stars.pts);

/* ---------------- sky lanterns (instanced) ---------------- */
const LANTERN_COUNT = 680;
function makeLanterns() {
  const base = new THREE.CylinderGeometry(0.34, 0.24, 0.95, 20, 1, true);
  const geo = new THREE.InstancedBufferGeometry();
  geo.index = base.index;
  geo.attributes.position = base.attributes.position;
  geo.attributes.normal = base.attributes.normal;
  geo.attributes.uv = base.attributes.uv;
  geo.instanceCount = LANTERN_COUNT;

  const offset = new Float32Array(LANTERN_COUNT * 3);
  const phase = new Float32Array(LANTERN_COUNT);
  const speed = new Float32Array(LANTERN_COUNT);
  const scale = new Float32Array(LANTERN_COUNT);
  const hue = new Float32Array(LANTERN_COUNT);
  for (let i = 0; i < LANTERN_COUNT; i++) {
    const ang = Math.random() * Math.PI * 2;
    const rad = 5 + 15 * Math.sqrt(Math.random());
    offset[i * 3] = Math.cos(ang) * rad;
    offset[i * 3 + 1] = Math.random() * FIELD_HEIGHT;
    offset[i * 3 + 2] = Math.sin(ang) * rad;
    phase[i] = Math.random();
    speed[i] = 0.28 + Math.random() * 0.5;
    scale[i] = 0.5 + Math.random() * 0.5;
    hue[i] = Math.random();
  }
  geo.setAttribute("iOffset", new THREE.InstancedBufferAttribute(offset, 3));
  geo.setAttribute("iPhase", new THREE.InstancedBufferAttribute(phase, 1));
  geo.setAttribute("iSpeed", new THREE.InstancedBufferAttribute(speed, 1));
  geo.setAttribute("iScale", new THREE.InstancedBufferAttribute(scale, 1));
  geo.setAttribute("iHue", new THREE.InstancedBufferAttribute(hue, 1));

  const mat = new THREE.ShaderMaterial({
    side: THREE.DoubleSide,
    uniforms: {
      time: { value: 0 },
      uHeight: { value: FIELD_HEIGHT },
      fogColor: { value: FOG_COLOR.clone() },
      fogDensity: { value: FOG_DENSITY },
    },
    vertexShader: /* glsl */ `
      uniform float time;
      uniform float uHeight;
      attribute vec3 iOffset;
      attribute float iPhase;
      attribute float iSpeed;
      attribute float iScale;
      attribute float iHue;
      varying vec2 vUv;
      varying float vHue;
      varying float vAppear;
      varying float vFlick;
      varying float vDepth;
      varying float vLocalY;
      varying vec3 vNrm;
      void main() {
        vUv = uv;
        vHue = iHue;
        vLocalY = position.y;
        vec3 p = position * iScale;
        float ang = time * (0.12 + iPhase * 0.12) + iPhase * 6.2831;
        float ca = cos(ang), sa = sin(ang);
        p = vec3(ca * p.x + sa * p.z, p.y, -sa * p.x + ca * p.z);
        vNrm = normalMatrix * vec3(ca * normal.x + sa * normal.z, normal.y, -sa * normal.x + ca * normal.z);
        float yy = mod(iOffset.y + time * iSpeed, uHeight);
        vec3 world = vec3(iOffset.x, yy, iOffset.z);
        world.x += sin(time * 0.33 + iPhase * 6.2831) * (0.45 + iPhase * 0.9);
        world.z += cos(time * 0.27 + iPhase * 4.71) * (0.45 + iPhase * 0.7);
        vAppear = smoothstep(0.0, 1.6, yy) * (1.0 - smoothstep(uHeight - 3.0, uHeight, yy));
        vFlick = 0.86 + 0.14 * sin(time * 6.1 + iPhase * 41.0) * sin(time * 9.3 + iPhase * 17.0);
        // shrink lanterns the camera is about to hit: kills full-screen overdraw + clip-pop
        vec4 mvc = modelViewMatrix * vec4(world, 1.0);
        p *= smoothstep(1.2, 3.2, -mvc.z);
        vec4 mv = modelViewMatrix * vec4(p + world, 1.0);
        vDepth = -mv.z;
        gl_Position = projectionMatrix * mv;
      }
    `,
    fragmentShader: /* glsl */ `
      uniform vec3 fogColor;
      uniform float fogDensity;
      varying vec2 vUv;
      varying float vHue;
      varying float vAppear;
      varying float vFlick;
      varying float vDepth;
      varying float vLocalY;
      varying vec3 vNrm;
      void main() {
        vec3 warmA = vec3(1.00, 0.58, 0.16); // amber
        vec3 warmB = vec3(1.00, 0.32, 0.15); // coral
        vec3 warmC = vec3(1.00, 0.42, 0.62); // pink
        vec3 base = vHue < 0.62
          ? mix(warmA, warmB, vHue / 0.62)
          : mix(warmB, warmC, (vHue - 0.62) / 0.38);
        // candle sits low: bottom glows hardest
        float g = mix(2.2, 0.72, smoothstep(-0.5, 0.5, vLocalY));
        float ribs = 0.93 + 0.07 * sin(vUv.x * 6.2831 * 7.0);
        float topDark = 1.0 - 0.4 * smoothstep(0.32, 0.5, vLocalY);
        vec3 col = base * g * ribs * topDark * vFlick;
        col *= 0.82 + 0.18 * abs(normalize(vNrm).z);
        col *= 1.05; // HDR push for bloom
        float fogF = 1.0 - exp(-fogDensity * fogDensity * vDepth * vDepth);
        col = mix(col, fogColor, fogF);
        col = mix(fogColor, col, vAppear);
        gl_FragColor = vec4(col, 1.0);
      }
    `,
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.frustumCulled = false;
  return { mesh, mat };
}
const lanterns = makeLanterns();
scene.add(lanterns.mesh);

/* ---------------- floating water candles ---------------- */
const CANDLE_COUNT = 240;
function makeCandles() {
  const base = new THREE.CylinderGeometry(0.11, 0.13, 0.16, 16);
  const geo = new THREE.InstancedBufferGeometry();
  geo.index = base.index;
  geo.attributes.position = base.attributes.position;
  geo.attributes.normal = base.attributes.normal;
  geo.attributes.uv = base.attributes.uv;
  geo.instanceCount = CANDLE_COUNT;

  const offset = new Float32Array(CANDLE_COUNT * 3);
  const phase = new Float32Array(CANDLE_COUNT);
  const hue = new Float32Array(CANDLE_COUNT);
  for (let i = 0; i < CANDLE_COUNT; i++) {
    const ang = Math.random() * Math.PI * 2;
    const rad = 2.5 + 15 * Math.sqrt(Math.random());
    offset[i * 3] = Math.cos(ang) * rad;
    offset[i * 3 + 1] = 0.1;
    offset[i * 3 + 2] = Math.sin(ang) * rad;
    phase[i] = Math.random() * Math.PI * 2;
    hue[i] = Math.random() * 0.7; // bias warm
  }
  geo.setAttribute("iOffset", new THREE.InstancedBufferAttribute(offset, 3));
  geo.setAttribute("iPhase", new THREE.InstancedBufferAttribute(phase, 1));
  geo.setAttribute("iHue", new THREE.InstancedBufferAttribute(hue, 1));

  const mat = new THREE.ShaderMaterial({
    uniforms: {
      time: { value: 0 },
      fogColor: { value: FOG_COLOR.clone() },
      fogDensity: { value: FOG_DENSITY },
    },
    vertexShader: /* glsl */ `
      uniform float time;
      attribute vec3 iOffset;
      attribute float iPhase;
      attribute float iHue;
      varying float vHue;
      varying float vFlick;
      varying float vDepth;
      varying float vLocalY;
      void main() {
        vHue = iHue;
        vLocalY = position.y;
        vec3 world = iOffset;
        world.x += sin(time * 0.14 + iPhase) * 0.5;
        world.z += cos(time * 0.11 + iPhase * 1.7) * 0.5;
        world.y += sin(time * 0.9 + iPhase * 3.0) * 0.02;
        vFlick = 0.8 + 0.2 * sin(time * 7.0 + iPhase * 13.0) * sin(time * 11.3 + iPhase * 5.0);
        vec4 mv = modelViewMatrix * vec4(position + world, 1.0);
        vDepth = -mv.z;
        gl_Position = projectionMatrix * mv;
      }
    `,
    fragmentShader: /* glsl */ `
      uniform vec3 fogColor;
      uniform float fogDensity;
      varying float vHue;
      varying float vFlick;
      varying float vDepth;
      varying float vLocalY;
      void main() {
        vec3 warmA = vec3(1.00, 0.55, 0.14);
        vec3 warmB = vec3(1.00, 0.34, 0.18);
        vec3 base = mix(warmA, warmB, vHue);
        float g = mix(1.1, 2.4, smoothstep(-0.08, 0.08, vLocalY)); // top glows
        vec3 col = base * g * vFlick * 1.05;
        float fogF = 1.0 - exp(-fogDensity * fogDensity * vDepth * vDepth);
        col = mix(col, fogColor, fogF);
        gl_FragColor = vec4(col, 1.0);
      }
    `,
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.frustumCulled = false;
  return { mesh, mat };
}
const candles = makeCandles();
scene.add(candles.mesh);

/* ---------------- embers ---------------- */
function makeEmbers(count) {
  const pos = new Float32Array(count * 3);
  const phase = new Float32Array(count);
  const speed = new Float32Array(count);
  for (let i = 0; i < count; i++) {
    pos[i * 3] = (Math.random() - 0.5) * 34;
    pos[i * 3 + 1] = Math.random() * 5;
    pos[i * 3 + 2] = (Math.random() - 0.5) * 34;
    phase[i] = Math.random() * Math.PI * 2;
    speed[i] = 0.1 + Math.random() * 0.3;
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute("position", new THREE.BufferAttribute(pos, 3));
  geo.setAttribute("aPhase", new THREE.BufferAttribute(phase, 1));
  geo.setAttribute("aSpeed", new THREE.BufferAttribute(speed, 1));
  const mat = new THREE.ShaderMaterial({
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
    uniforms: { time: { value: 0 } },
    vertexShader: /* glsl */ `
      uniform float time;
      attribute float aPhase;
      attribute float aSpeed;
      varying float vA;
      void main() {
        vec3 p = position;
        p.y = mod(position.y + time * aSpeed, 5.0);
        p.x += sin(time * 0.5 + aPhase) * 0.6;
        p.z += cos(time * 0.4 + aPhase * 1.3) * 0.6;
        vA = 0.4 + 0.6 * sin(time * 2.0 + aPhase * 7.0);
        vec4 mv = modelViewMatrix * vec4(p, 1.0);
        gl_PointSize = min(3.2 * (60.0 / -mv.z), 18.0);
        gl_Position = projectionMatrix * mv;
      }
    `,
    fragmentShader: /* glsl */ `
      varying float vA;
      void main() {
        vec2 c = gl_PointCoord - 0.5;
        float a = smoothstep(0.5, 0.0, length(c));
        gl_FragColor = vec4(vec3(1.0, 0.62, 0.25), a * a * max(vA, 0.0) * 0.7);
      }
    `,
  });
  const pts = new THREE.Points(geo, mat);
  pts.frustumCulled = false;
  return { pts, mat };
}
const embers = makeEmbers(320);
embers.pts.layers.set(1);
scene.add(embers.pts);

/* ---------------- fireworks (cut-the-cake celebration, 15s) ----------------
   Shell-based: rockets launch from the water, trail upward, then burst into
   one of five patterns. Sparks cool from white-hot to their shell colour and
   twinkle as they fall.                                                     */
const FW_MAX = 11000;
function makeFireworks() {
  const geo = new THREE.BufferGeometry();
  geo.setAttribute("position", new THREE.BufferAttribute(new Float32Array(FW_MAX * 3), 3));
  geo.setAttribute("aColor", new THREE.BufferAttribute(new Float32Array(FW_MAX * 3), 3));
  geo.setAttribute("aAlpha", new THREE.BufferAttribute(new Float32Array(FW_MAX), 1));
  geo.setAttribute("aSize", new THREE.BufferAttribute(new Float32Array(FW_MAX), 1));
  geo.setAttribute("aTwinkle", new THREE.BufferAttribute(new Float32Array(FW_MAX), 1));
  geo.setDrawRange(0, 0);
  const mat = new THREE.ShaderMaterial({
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
    uniforms: { time: { value: 0 } },
    vertexShader: /* glsl */ `
      attribute vec3 aColor;
      attribute float aAlpha;
      attribute float aSize;
      attribute float aTwinkle;
      varying vec3 vC;
      varying float vA;
      void main() {
        vC = aColor;
        vA = aAlpha;
        vec4 mv = modelViewMatrix * vec4(position, 1.0);
        gl_PointSize = clamp(aSize * (150.0 / -mv.z), 1.0, 14.0);
        gl_Position = projectionMatrix * mv;
      }
    `,
    fragmentShader: /* glsl */ `
      uniform float time;
      varying vec3 vC;
      varying float vA;
      void main() {
        vec2 c = gl_PointCoord - 0.5;
        float d = length(c);
        // tight core + soft halo reads brighter than a single falloff
        float core = smoothstep(0.22, 0.0, d);
        float halo = smoothstep(0.5, 0.06, d);
        float a = (halo * halo * 0.75 + core * 0.85) * vA;
        gl_FragColor = vec4(vC, a);
      }
    `,
  });
  const pts = new THREE.Points(geo, mat);
  pts.frustumCulled = false;
  pts.visible = false;
  // stays on layer 0 so the water mirrors the whole show

  // motion streaks — one additive segment per spark, tail fading to nothing.
  // This is what separates "fireworks" from "a cloud of dots".
  const sGeo = new THREE.BufferGeometry();
  sGeo.setAttribute("position", new THREE.BufferAttribute(new Float32Array(FW_MAX * 6), 3));
  sGeo.setAttribute("aColor", new THREE.BufferAttribute(new Float32Array(FW_MAX * 6), 3));
  sGeo.setAttribute("aAlpha", new THREE.BufferAttribute(new Float32Array(FW_MAX * 2), 1));
  sGeo.setDrawRange(0, 0);
  const sMat = new THREE.ShaderMaterial({
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
    vertexShader: /* glsl */ `
      attribute vec3 aColor;
      attribute float aAlpha;
      varying vec3 vC;
      varying float vA;
      void main() {
        vC = aColor; vA = aAlpha;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: /* glsl */ `
      varying vec3 vC;
      varying float vA;
      void main() { gl_FragColor = vec4(vC, vA); }
    `,
  });
  const streaks = new THREE.LineSegments(sGeo, sMat);
  streaks.frustumCulled = false;
  streaks.visible = false;

  return {
    pts, geo, mat, streaks, sGeo,
    sparks: [], shells: [], pending: [],
    activeUntil: -1, nextLaunch: 0,
  };
}
const fireworks = makeFireworks();
scene.add(fireworks.pts);
scene.add(fireworks.streaks);

const fwFlash = new THREE.PointLight(0xffd9a0, 0, 40, 2);
fwFlash.visible = false;
scene.add(fwFlash);

const FW_PALETTE = [
  [1.00, 0.66, 0.24], // gold
  [1.00, 0.36, 0.48], // rose
  [0.46, 0.68, 1.00], // ice blue
  [0.72, 0.46, 1.00], // violet
  [0.46, 1.00, 0.74], // mint
  [1.00, 0.88, 0.52], // champagne
];
const FW_TYPES = ["peony", "willow", "ring", "chrysanthemum", "crackle"];

function pushSpark(s) {
  if (fireworks.sparks.length < FW_MAX) fireworks.sparks.push(s);
}
/* Shells are aimed at a point the camera is actually looking at, then launched
   from the water directly beneath it — so the show always plays in frame,
   whatever the camera is doing, and still rises off the lake like a real one. */
const _fwFwd = new THREE.Vector3();
const _fwRight = new THREE.Vector3();
const _fwUp = new THREE.Vector3(0, 1, 0);
function launchShell() {
  camera.getWorldDirection(_fwFwd);
  _fwFwd.y = 0;
  if (_fwFwd.lengthSq() < 1e-4) _fwFwd.set(0, 0, -1);
  _fwFwd.normalize();
  _fwRight.crossVectors(_fwFwd, _fwUp).normalize();

  const dist = 15 + Math.random() * 16;               // well behind the subject
  const lateral = (Math.random() - 0.5) * 2 * dist * 0.55; // inside the frame
  const burstY = 5.5 + Math.random() * 5.5;

  const bx = camera.position.x + _fwFwd.x * dist + _fwRight.x * lateral;
  const bz = camera.position.z + _fwFwd.z * dist + _fwRight.z * lateral;

  const G = 4.6;
  const rise = Math.max(1.5, burstY - 0.4);
  const type = FW_TYPES[(Math.random() * FW_TYPES.length) | 0];
  fireworks.shells.push({
    x: bx + (Math.random() - 0.5) * 1.5, y: 0.4, z: bz + (Math.random() - 0.5) * 1.5,
    vx: (Math.random() - 0.5) * 0.9,
    vy: Math.sqrt(2 * G * rise),                       // apex lands on burstY
    vz: (Math.random() - 0.5) * 0.9,
    fuse: 6,                                           // apex detonates, not the fuse
    age: 0,
    type,
    base: FW_PALETTE[(Math.random() * FW_PALETTE.length) | 0],
    base2: FW_PALETTE[(Math.random() * FW_PALETTE.length) | 0],
    dual: Math.random() < 0.4,
    breaks: Math.random() < 0.3 ? 2 + ((Math.random() * 3) | 0) : 0, // multi-break shell
    trailAcc: 0,
  });
}
function explode(sh) {
  const { x, y, z, type } = sh;
  const tint = (base, jitter) => [
    Math.min(1.6, base[0] * (1 - jitter + Math.random() * jitter * 2)),
    Math.min(1.6, base[1] * (1 - jitter + Math.random() * jitter * 2)),
    Math.min(1.6, base[2] * (1 - jitter + Math.random() * jitter * 2)),
  ];
  const emit = (n, cfg) => {
    for (let i = 0; i < n; i++) {
      // correct uniform-sphere sampling (cosine-corrected, no polar clumping)
      const u = Math.random() * 2 - 1;
      const ph = Math.random() * Math.PI * 2;
      const sq = Math.sqrt(Math.max(0, 1 - u * u));
      let dx = sq * Math.cos(ph), dy = u, dz = sq * Math.sin(ph);
      if (cfg.ring) {
        // flatten onto a randomly tilted disc
        dy *= 0.09;
        const n2 = Math.hypot(dx, dy, dz) || 1;
        dx /= n2; dy /= n2; dz /= n2;
        const tl = cfg.tilt;
        const cy2 = Math.cos(tl), sy2 = Math.sin(tl);
        const ny = dy * cy2 - dz * sy2, nz = dy * sy2 + dz * cy2;
        dy = ny; dz = nz;
      }
      const sp = cfg.speed * (cfg.even ? 0.92 + Math.random() * 0.16 : 0.35 + Math.random() * 0.9);
      const col = cfg.dual && Math.random() < 0.5 ? cfg.colB : cfg.colA;
      const c = tint(col, 0.16);
      pushSpark({
        x, y, z,
        vx: dx * sp, vy: dy * sp, vz: dz * sp,
        life: cfg.life * (0.75 + Math.random() * 0.5),
        age: 0,
        r: c[0], g: c[1], b: c[2],
        size: cfg.size * (0.7 + Math.random() * 0.6),
        grav: cfg.grav,
        drag: cfg.drag,
        twinkle: cfg.twinkle ? 0.55 + Math.random() * 0.45 : 0,
        tph: Math.random() * 6.283,
        trail: cfg.trail,
        trailAcc: 0,
        streak: cfg.streak || 0,
      });
    }
  };
  const common = { colA: sh.base, colB: sh.base2, dual: sh.dual };
  const S = sh.scale || 1;
  if (type === "peony") {
    emit(260 * S, { ...common, speed: 6.4 * S, life: 1.8, size: 3.4, grav: 3.0, drag: 0.62, even: true, twinkle: true, streak: 1.0 });
    emit(60 * S, { ...common, speed: 2.4 * S, life: 2.2, size: 2.6, grav: 2.6, drag: 0.66, twinkle: true, streak: 0.7 });
  } else if (type === "willow") {
    emit(200 * S, { ...common, colA: [1.0, 0.74, 0.34], colB: [1.0, 0.62, 0.26], dual: false,
      speed: 4.2 * S, life: 3.4, size: 3.4, grav: 4.6, drag: 0.5, even: true, twinkle: true, trail: 0.5, streak: 1.4 });
  } else if (type === "ring") {
    emit(190 * S, { ...common, speed: 5.9 * S, life: 2.0, size: 3.0, grav: 2.4, drag: 0.55,
      even: true, ring: true, tilt: Math.random() * Math.PI, twinkle: true, streak: 1.1 });
    emit(70 * S, { ...common, speed: 1.9 * S, life: 1.4, size: 2.6, grav: 2.4, drag: 0.7, streak: 0.6 });
  } else if (type === "chrysanthemum") {
    emit(230 * S, { ...common, speed: 5.6 * S, life: 2.5, size: 3.3, grav: 3.2, drag: 0.55, even: true, trail: 0.42, twinkle: true, streak: 1.3 });
  } else {
    // crackle — dense, fast, short, hard sparkle
    emit(300 * S, { ...common, speed: 7.2 * S, life: 1.05, size: 2.5, grav: 2.6, drag: 0.78, twinkle: true, streak: 1.6 });
  }
  // multi-break shell: secondary bursts blossom out of the first
  if (sh.breaks) {
    for (let i = 0; i < sh.breaks; i++) {
      const u = Math.random() * 2 - 1;
      const ph = Math.random() * Math.PI * 2;
      const sq = Math.sqrt(Math.max(0, 1 - u * u));
      const r = 2.2 + Math.random() * 2.4;
      fireworks.pending.push({
        at: sh.bt + 0.42 + Math.random() * 0.5,
        x: x + sq * Math.cos(ph) * r, y: y + u * r * 0.7, z: z + sq * Math.sin(ph) * r,
        type: FW_TYPES[(Math.random() * FW_TYPES.length) | 0],
        base: sh.base2, base2: sh.base, dual: false, breaks: 0, scale: 0.5,
      });
    }
  }
  // flash of light at the burst
  fwFlash.position.set(x, y, z);
  fwFlash.color.setRGB(sh.base[0], sh.base[1], sh.base[2]);
  fwFlash.intensity = 26 * S;
  fwFlash.visible = true;
}

function updateFireworks(t, dt) {
  const fw = fireworks;
  if (fw.activeUntil < 0) return;
  fw.mat.uniforms.time.value = t;

  if (t < fw.activeUntil && t >= fw.nextLaunch) {
    launchShell();
    if (Math.random() < 0.45) launchShell();
    if (Math.random() < 0.15) launchShell();
    // tighten the cadence toward the finale
    const togo = fw.activeUntil - t;
    fw.nextLaunch = t + (togo < 3.5 ? 0.14 + Math.random() * 0.16 : 0.42 + Math.random() * 0.46);
  }

  // shells: rise, trail, burst
  let sw = 0;
  for (let i = 0; i < fw.shells.length; i++) {
    const sh = fw.shells[i];
    sh.age += dt;
    sh.vy -= 4.6 * dt;
    sh.x += sh.vx * dt; sh.y += sh.vy * dt; sh.z += sh.vz * dt;
    sh.trailAcc += dt;
    while (sh.trailAcc > 0.012) {
      sh.trailAcc -= 0.012;
      pushSpark({
        x: sh.x + (Math.random() - 0.5) * 0.1,
        y: sh.y, z: sh.z + (Math.random() - 0.5) * 0.1,
        vx: (Math.random() - 0.5) * 0.5, vy: -0.4 - Math.random() * 0.5, vz: (Math.random() - 0.5) * 0.5,
        life: 0.42 + Math.random() * 0.28, age: 0,
        r: 1.25, g: 0.72, b: 0.28,
        size: 2.0, grav: 1.0, drag: 0.9, twinkle: 0, tph: 0, trail: 0, trailAcc: 0,
      });
    }
    if (sh.age >= sh.fuse || sh.vy <= 0.4) { sh.bt = t; explode(sh); continue; }
    fw.shells[sw++] = sh;
  }
  fw.shells.length = sw;

  // secondary breaks that were scheduled by a multi-break shell
  let pw = 0;
  for (let i = 0; i < fw.pending.length; i++) {
    const b = fw.pending[i];
    if (t >= b.at) { b.bt = t; explode(b); continue; }
    fw.pending[pw++] = b;
  }
  fw.pending.length = pw;

  // flash decay
  if (fwFlash.visible) {
    fwFlash.intensity *= Math.pow(0.012, dt);
    if (fwFlash.intensity < 0.05) { fwFlash.intensity = 0; fwFlash.visible = false; }
  }

  const pos = fw.geo.attributes.position.array;
  const col = fw.geo.attributes.aColor.array;
  const alp = fw.geo.attributes.aAlpha.array;
  const siz = fw.geo.attributes.aSize.array;
  const twk = fw.geo.attributes.aTwinkle.array;
  const spos = fw.sGeo.attributes.position.array;
  const scol = fw.sGeo.attributes.aColor.array;
  const salp = fw.sGeo.attributes.aAlpha.array;
  const born = [];
  let w = 0, sw2 = 0;
  for (let i = 0; i < fw.sparks.length; i++) {
    const s = fw.sparks[i];
    s.age += dt;
    if (s.age >= s.life) continue;
    s.vy -= s.grav * dt;
    const d = Math.pow(s.drag, dt * 60);
    s.vx *= d; s.vy *= d; s.vz *= d;
    s.x += s.vx * dt; s.y += s.vy * dt; s.z += s.vz * dt;
    // willow / chrysanthemum drip glowing trails behind them
    if (s.trail) {
      s.trailAcc += dt;
      if (s.trailAcc > s.trail * 0.16) {
        s.trailAcc = 0;
        born.push({
          x: s.x, y: s.y, z: s.z,
          vx: s.vx * 0.12, vy: s.vy * 0.12 - 0.2, vz: s.vz * 0.12,
          life: 0.4 + Math.random() * 0.3, age: 0,
          r: s.r * 0.9, g: s.g * 0.78, b: s.b * 0.6,
          size: s.size * 0.55, grav: 1.4, drag: 0.86,
          twinkle: 0.8, tph: Math.random() * 6.283, trail: 0, trailAcc: 0,
        });
      }
    }
    const k = 1 - s.age / s.life;
    // white-hot for the first instant, then cool into the shell colour
    const hot = Math.max(0, 1 - s.age / 0.16);
    let tw = 1;
    if (s.twinkle) {
      const f = 0.55 + 0.45 * Math.sin(t * 26 + s.tph);
      tw = 1 - s.twinkle * (1 - f) * (1 - k * 0.4);
    }
    fw.sparks[w] = s;
    pos[w * 3] = s.x; pos[w * 3 + 1] = s.y; pos[w * 3 + 2] = s.z;
    col[w * 3] = s.r + (1.35 - s.r) * hot;
    col[w * 3 + 1] = s.g + (1.25 - s.g) * hot;
    col[w * 3 + 2] = s.b + (1.1 - s.b) * hot;
    const a = Math.pow(k, 0.65) * tw;
    const cr = col[w * 3], cg = col[w * 3 + 1], cb = col[w * 3 + 2];
    alp[w] = a;
    siz[w] = s.size * (0.42 + 0.58 * k) * (1 + hot * 0.5);
    twk[w] = s.twinkle;
    w++;
    // motion streak: a segment trailing back along this spark's velocity
    if (s.streak) {
      const L = s.streak * 0.055;
      const j = sw2 * 6;
      spos[j] = s.x - s.vx * L; spos[j + 1] = s.y - s.vy * L; spos[j + 2] = s.z - s.vz * L;
      spos[j + 3] = s.x; spos[j + 4] = s.y; spos[j + 5] = s.z;
      scol[j] = cr; scol[j + 1] = cg; scol[j + 2] = cb;
      scol[j + 3] = cr; scol[j + 4] = cg; scol[j + 5] = cb;
      salp[sw2 * 2] = 0;              // tail fades out
      salp[sw2 * 2 + 1] = a * 0.85;   // head is the bright end
      sw2++;
    }
  }
  fw.sparks.length = w;
  for (let i = 0; i < born.length; i++) pushSpark(born[i]);

  fw.geo.setDrawRange(0, w);
  fw.geo.attributes.position.updateRanges = [{ start: 0, count: w * 3 }];
  fw.geo.attributes.position.needsUpdate = true;
  fw.geo.attributes.aColor.needsUpdate = true;
  fw.geo.attributes.aAlpha.needsUpdate = true;
  fw.geo.attributes.aSize.needsUpdate = true;
  fw.geo.attributes.aTwinkle.needsUpdate = true;
  fw.pts.visible = w > 0;

  fw.sGeo.setDrawRange(0, sw2 * 2);
  fw.sGeo.attributes.position.updateRanges = [{ start: 0, count: sw2 * 6 }];
  fw.sGeo.attributes.position.needsUpdate = true;
  fw.sGeo.attributes.aColor.needsUpdate = true;
  fw.sGeo.attributes.aAlpha.needsUpdate = true;
  fw.streaks.visible = sw2 > 0;

  if (t >= fw.activeUntil && w === 0 && fw.shells.length === 0 && fw.pending.length === 0) {
    fw.activeUntil = -1;
    fw.pts.visible = false;
    fw.streaks.visible = false;
  }
}

/* ---------------- water (planar reflection + shader distortion) ---------------- */
const waterShader = {
  name: "LanternWater",
  uniforms: {
    color: { value: null },
    tDiffuse: { value: null },
    textureMatrix: { value: null },
    time: { value: 0 },
  },
  vertexShader: /* glsl */ `
    uniform mat4 textureMatrix;
    varying vec4 vUvP;
    varying vec3 vWorld;
    void main() {
      vUvP = textureMatrix * vec4(position, 1.0);
      vec4 wp = modelMatrix * vec4(position, 1.0);
      vWorld = wp.xyz;
      gl_Position = projectionMatrix * viewMatrix * wp;
    }
  `,
  fragmentShader: /* glsl */ `
    uniform vec3 color;
    uniform sampler2D tDiffuse;
    uniform float time;
    varying vec4 vUvP;
    varying vec3 vWorld;
    float hash(vec2 p) { p = fract(p * vec2(123.34, 456.21)); p += dot(p, p + 45.32); return fract(p.x * p.y); }
    float noise(vec2 p) {
      vec2 i = floor(p), f = fract(p);
      vec2 u = f * f * (3.0 - 2.0 * f);
      return mix(mix(hash(i), hash(i + vec2(1.0, 0.0)), u.x),
                 mix(hash(i + vec2(0.0, 1.0)), hash(i + vec2(1.0, 1.0)), u.x), u.y);
    }
    void main() {
      vec2 wuv = vWorld.xz;
      float n1 = noise(wuv * 0.9 + vec2(time * 0.20, time * 0.15));
      float n2 = noise(wuv * 2.6 + vec2(-time * 0.28, time * 0.22));
      float n3 = noise(wuv * 6.5 + vec2(time * 0.42, -time * 0.36));
      vec2 distort = (vec2(n1 + n3 * 0.5, n2 + n3 * 0.5) - 0.75);
      vec4 uv = vUvP;
      uv.xy += distort * vec2(0.018, 0.05) * uv.w;
      vec3 refl = texture2DProj(tDiffuse, uv).rgb;
      vec3 col = color + refl * 0.45;
      float glint = pow(noise(wuv * 9.0 + vec2(time * 0.7, -time * 0.55)), 7.0);
      col += vec3(1.0, 0.68, 0.38) * glint * 0.28;
      float d = length(vWorld - cameraPosition);
      float fogF = 1.0 - exp(-0.016 * 0.016 * d * d);
      col = mix(col, vec3(0.070, 0.043, 0.149), fogF);
      gl_FragColor = vec4(col, 1.0);
    }
  `,
};
const water = new Reflector(new THREE.PlaneGeometry(400, 400), {
  clipBias: 0.05,
  textureWidth: 512,
  textureHeight: 512,
  color: new THREE.Color(0x0a0620),
  shader: waterShader,
});
water.rotation.x = -Math.PI / 2;
water.position.y = 0;
scene.add(water);

/* ---------------- birthday cake top art (drawn procedurally) ---------------- */
function makeCakeTexture() {
  const cv = document.createElement("canvas");
  cv.width = cv.height = 512;
  const x = cv.getContext("2d");
  x.fillStyle = "#cfe4ee";
  x.fillRect(0, 0, 512, 512);
  // arc lettering
  x.fillStyle = "#fffdf6";
  x.textAlign = "center";
  x.textBaseline = "middle";
  x.font = "600 42px 'Comic Sans MS', 'Segoe Print', cursive";
  const msg = "HAPPY BIRTHDAY";
  const ccx = 256, ccy = 300, arcR = 196;
  const a0 = -Math.PI * 0.85, a1 = -Math.PI * 0.15;
  for (let i = 0; i < msg.length; i++) {
    const a = a0 + (i / (msg.length - 1)) * (a1 - a0);
    x.save();
    x.translate(ccx + Math.cos(a) * arcR, ccy + Math.sin(a) * arcR);
    x.rotate(a + Math.PI / 2);
    x.fillText(msg[i], 0, 0);
    x.restore();
  }
  x.font = "600 38px 'Comic Sans MS', 'Segoe Print', cursive";
  x.fillText("MY LOVE", 256, 168);
  // little heart
  x.beginPath();
  x.arc(249, 208, 7, Math.PI, 0);
  x.arc(263, 208, 7, Math.PI, 0);
  x.lineTo(256, 224);
  x.closePath();
  x.fill();
  // chibi pair — bodies, then heads pressed together
  x.lineWidth = 8;
  x.strokeStyle = "#332f2c";
  x.fillStyle = "#fbfaf6";
  x.lineJoin = "round";
  x.lineCap = "round";
  const rrect = (a, b, w, h, r) => { x.beginPath(); x.roundRect(a, b, w, h, r); x.fill(); x.stroke(); };
  rrect(176, 320, 92, 118, 34);   // left body
  rrect(282, 316, 88, 126, 32);   // right body
  x.beginPath(); x.arc(232, 278, 64, 0, 7); x.fill(); x.stroke(); // left head
  x.beginPath(); x.arc(322, 266, 58, 0, 7); x.fill(); x.stroke(); // right head, leaning in
  // left face: squeezed-shut happy eyes + smile
  x.lineWidth = 6;
  x.beginPath(); x.moveTo(196, 266); x.lineTo(212, 274); x.lineTo(196, 282); x.stroke();
  x.beginPath(); x.moveTo(252, 266); x.lineTo(236, 274); x.lineTo(252, 282); x.stroke();
  x.beginPath(); x.arc(224, 298, 10, 0.15 * Math.PI, 0.85 * Math.PI); x.stroke();
  // right face: closed eye, cheek pressed
  x.beginPath(); x.arc(344, 260, 9, 0.15 * Math.PI, 0.9 * Math.PI); x.stroke();
  // hugging arm
  x.lineWidth = 8;
  x.beginPath(); x.moveTo(288, 350); x.quadraticCurveTo(262, 364, 246, 350); x.stroke();
  // blush
  x.fillStyle = "rgba(214,170,190,0.55)";
  x.beginPath(); x.arc(198, 298, 8, 0, 7); x.fill();
  x.beginPath(); x.arc(352, 282, 8, 0, 7); x.fill();
  const tex = new THREE.CanvasTexture(cv);
  tex.colorSpace = THREE.SRGBColorSpace;
  tex.anisotropy = 4;
  return tex;
}

function makeBoat() {
  const g = new THREE.Group();

  const shape = new THREE.Shape();
  shape.moveTo(-2.4, 0);
  shape.quadraticCurveTo(0, 0.95, 2.4, 0);
  shape.quadraticCurveTo(0, -0.95, -2.4, 0);
  const hullGeo = new THREE.ExtrudeGeometry(shape, {
    depth: 0.55,
    bevelEnabled: true,
    bevelThickness: 0.06,
    bevelSize: 0.05,
    bevelSegments: 3,
    curveSegments: 36,
  });
  // curl the bow / stern upward (z is "up" pre-rotation)
  const pos = hullGeo.attributes.position;
  for (let i = 0; i < pos.count; i++) {
    const x = pos.getX(i);
    pos.setZ(i, pos.getZ(i) + Math.pow(Math.abs(x) / 2.4, 3.0) * 0.5);
  }
  hullGeo.computeVertexNormals();
  const hull = new THREE.Mesh(
    hullGeo,
    new THREE.MeshStandardMaterial({ color: 0x3a1620, roughness: 0.62, metalness: 0.05 })
  );
  hull.rotation.x = -Math.PI / 2;
  g.add(hull);

  // lantern pole at stern
  const pole = new THREE.Mesh(
    new THREE.CylinderGeometry(0.025, 0.03, 0.95, 14),
    new THREE.MeshStandardMaterial({ color: 0x241018, roughness: 0.9 })
  );
  pole.position.set(1.85, 0.95, 0);
  g.add(pole);

  const boatLantern = new THREE.Mesh(
    new THREE.CylinderGeometry(0.13, 0.1, 0.26, 18, 1, true),

  boatLantern.position.set(1.85, 1.28, 0);

  const boatLight = new THREE.PointLight(0xffa04d, 2.5, 10, 2);

  // one lantern resting on the water beside the boat

  const restLight = new THREE.PointLight(0xffb45e, 2.2, 6, 2);
  restLight.position.set(-1.4, 0.35, 1.0);
  g.add(restLight);

  // birthday cake amidships
  const cake = new THREE.Group();
  const R = 0.45;
  const frosting = new THREE.MeshStandardMaterial({ color: 0xf8f4ec, roughness: 0.35 });
  const blueIce = new THREE.MeshStandardMaterial({ color: 0xcfe4ee, roughness: 0.4 });
  const cakeBody = new THREE.Mesh(new THREE.CylinderGeometry(R, R * 1.02, 0.28, 96), frosting);
  cakeBody.position.y = 0.14;
  cake.add(cakeBody);
  const icing = new THREE.Mesh(new THREE.CylinderGeometry(R + 0.012, R + 0.012, 0.05, 96), blueIce);
  icing.position.y = 0.295;
  cake.add(icing);
  const art = new THREE.Mesh(
    new THREE.CircleGeometry(R + 0.006, 48),
    new THREE.MeshStandardMaterial({ map: makeCakeTexture(), roughness: 0.45 })
  );
  art.rotation.x = -Math.PI / 2;
  art.position.y = 0.323;
  cake.add(art);
  const rim = new THREE.Mesh(new THREE.TorusGeometry(R + 0.01, 0.022, 20, 96), frosting);
  rim.rotation.x = Math.PI / 2;
  rim.position.y = 0.318;
  cake.add(rim);
  // 20 candles round the circumference
  const candleGeo = new THREE.CylinderGeometry(0.017, 0.017, 0.13, 20);
  const flameGeo = new THREE.ConeGeometry(0.013, 0.04, 14);
  const flameMat = new THREE.MeshBasicMaterial({ color: 0xffdf9a });
  const pastelMats = [0xfff3c2, 0xffd9e2, 0xd9ecff, 0xe6f7d9].map(
    (c) => new THREE.MeshStandardMaterial({ color: c, roughness: 0.5 })
  );
  for (let i = 0; i < 20; i++) {
    const a = (i / 20) * Math.PI * 2;
    const cxr = Math.cos(a) * (R - 0.07), czr = Math.sin(a) * (R - 0.07);
    const cd = new THREE.Mesh(candleGeo, pastelMats[i % 4]);
    cd.position.set(cxr, 0.385, czr);
    cake.add(cd);
    const fl = new THREE.Mesh(flameGeo, flameMat);
    fl.position.set(cxr, 0.47, czr);

  // knife resting on the deck beside the cake

  const bladeShape = new THREE.Shape();
  bladeShape.moveTo(0, -0.028);
  bladeShape.lineTo(0.34, -0.028);
  bladeShape.quadraticCurveTo(0.46, -0.02, 0.5, 0.012);

  handle.rotation.z = Math.PI / 2;
  handle.position.set(-0.12, 0, 0);
  knife.add(handle);
  knife.position.set(-0.35, 0.62, 0.72);
  knife.rotation.set(-Math.PI / 2, 0, 0.9);

function makeLighthouse() {
  const g = new THREE.Group();
  const dark = new THREE.MeshStandardMaterial({ color: 0x1c1730, roughness: 0.78 });

  const rock = new THREE.Mesh(new THREE.DodecahedronGeometry(1.9, 2), dark);
  rock.scale.set(1.35, 0.55, 1.35);
  rock.position.y = 0.25;
  g.add(rock);

  // brick tower — instanced boxes in tapered courses, igloo-style pop bricks
  const COURSE_H = 0.24;
  const COURSES = 14;
  const bricks = [];
  for (let c = 0; c < COURSES; c++) {
    const tC = c / (COURSES - 1);
    const r = 0.92 - (0.92 - 0.62) * tC;
    const y = 0.55 + c * COURSE_H;
    const count = Math.max(10, Math.round((Math.PI * 2 * r) / 0.3));
    for (let i = 0; i < count; i++) {
      const theta = (i / count) * Math.PI * 2 + (c % 2) * (Math.PI / count);
      bricks.push({ theta, r, y, w: ((Math.PI * 2 * r) / count) * 0.97 });
    }
  }
  const brickGeo = new THREE.BoxGeometry(1, COURSE_H * 0.94, 0.18);
  const brickMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.78, metalness: 0.04 });
  // instance color doubles as a soft emissive term: popped bricks self-glow warm
  brickMat.onBeforeCompile = (shader) => {
    shader.fragmentShader = shader.fragmentShader.replace(
      "#include <emissivemap_fragment>",
      `#include <emissivemap_fragment>
      #ifdef USE_INSTANCING_COLOR
        totalEmissiveRadiance += vColor * vColor * 0.5;
      #endif`
    );
  };
  const brickMesh = new THREE.InstancedMesh(brickGeo, brickMat, bricks.length);
  brickMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
  const stoneBase = new THREE.Color(0x3d3757);
  const baseColors = [];
  const dummy = new THREE.Object3D();
  for (let i = 0; i < bricks.length; i++) {
    const b = bricks[i];
    dummy.position.set(Math.cos(b.theta) * b.r, b.y, Math.sin(b.theta) * b.r);
    dummy.rotation.set(0, Math.PI / 2 - b.theta, 0);
    dummy.scale.set(b.w, 1, 1);
    dummy.updateMatrix();
    brickMesh.setMatrixAt(i, dummy.matrix);
    const c0 = stoneBase.clone().multiplyScalar(0.94 + Math.random() * 0.12);
    baseColors.push(c0);
    brickMesh.setColorAt(i, c0);
  }
  brickMesh.instanceColor.needsUpdate = true;
  g.add(brickMesh);
  g.userData.bricks = {
    mesh: brickMesh,
    data: bricks,
    baseColors,
    popCur: new Float32Array(bricks.length),
    popTarget: new Float32Array(bricks.length),
    dummy,
  };

  const gallery = new THREE.Mesh(new THREE.CylinderGeometry(0.85, 0.85, 0.22, 32), dark);
  gallery.position.y = 4.0;
  g.add(gallery);

  const lamp = new THREE.Mesh(
    new THREE.CylinderGeometry(0.45, 0.45, 0.62, 28, 1, true),
    new THREE.MeshBasicMaterial({ color: 0xffd9a0, side: THREE.DoubleSide })
  );
  lamp.position.y = 4.45;
  g.add(lamp);

  const roof = new THREE.Mesh(new THREE.ConeGeometry(0.62, 0.7, 28), dark);
  roof.position.y = 5.1;
  g.add(roof);

  const light = new THREE.PointLight(0xffd9a0, 4.5, 30, 2);
  light.position.y = 4.5;
  g.add(light);

  // rotating beam
  const beamGroup = new THREE.Group();
  beamGroup.position.y = 4.45;
  const beamMat = new THREE.ShaderMaterial({
    transparent: true,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    side: THREE.DoubleSide,
    uniforms: {
      beamColor: { value: new THREE.Color(1.0, 0.85, 0.62) },
    },
    vertexShader: /* glsl */ `
      varying float vT;      // 0 at apex (lamp), 1 at base (far end)
      varying vec3 vNrm;
      varying vec3 vView;
      void main() {
        vT = 0.5 - position.y / 13.0;
        vec4 wp = modelMatrix * vec4(position, 1.0);
        vNrm = normalize(mat3(modelMatrix) * normal);
        vView = cameraPosition - wp.xyz;
        gl_Position = projectionMatrix * viewMatrix * wp;
      }
    `,
    fragmentShader: /* glsl */ `
      uniform vec3 beamColor;
      varying float vT;
      varying vec3 vNrm;
      varying vec3 vView;
      void main() {
        // bright at the lamp, dissolving with distance
        float fall = pow(clamp(1.0 - vT, 0.0, 1.0), 2.4);
        // fade out silhouette edges so the cone never reads as a circle
        float edge = abs(dot(normalize(vNrm), normalize(vView)));
        float a = fall * pow(edge, 1.6);
        gl_FragColor = vec4(beamColor * a * 1.35, 1.0);
      }
    `,
  });
  const beam = new THREE.Mesh(new THREE.ConeGeometry(2.8, 13, 24, 1, true), beamMat);
  beam.rotation.z = Math.PI / 2;
  beam.position.x = 6.5;
  beamGroup.add(beam);
  g.add(beamGroup);
  g.userData.beamGroup = beamGroup;

  g.position.set(9, 0, -7);
  return g;
}

/* scroll lock — holds the camera on a steady frame while the cut plays out.
   Never uses overflow:hidden (losing the scrollbar resizes the canvas and
   snaps the aspect); instead it swallows scroll gestures and pins progress. */
const scrollLock = { on: false, y: 0, p: 0, until: 0, hard: 0 };
const swallow = (e) => { if (scrollLock.on) e.preventDefault(); };
const SCROLL_KEYS = new Set([
  " ", "PageUp", "PageDown", "ArrowUp", "ArrowDown", "Home", "End",
]);
const keyGuard = (e) => {
  if (!scrollLock.on) return;
  if (e.key === "Escape") { unlockScroll(); return; }
  if (SCROLL_KEYS.has(e.key)) e.preventDefault();
};
function lockScroll(t, seconds) {
  scrollLock.until = t + seconds;
  scrollLock.hard = t + seconds + 10; // never stick, whatever happens
  if (scrollLock.on) return;
  scrollLock.on = true;
  scrollLock.y = window.scrollY;
  scrollLock.p = progress;
  window.addEventListener("wheel", swallow, { passive: false });
  window.addEventListener("touchmove", swallow, { passive: false });
  window.addEventListener("keydown", keyGuard, { passive: false });
}
function unlockScroll() {
  if (!scrollLock.on) return;
  scrollLock.on = false;
  window.removeEventListener("wheel", swallow);
  window.removeEventListener("touchmove", swallow);
  window.removeEventListener("keydown", keyGuard);
  // hand the smoothed camera back to wherever the page actually sits
  const max = document.documentElement.scrollHeight - window.innerHeight;
  progressTarget = max > 0 ? Math.min(1, Math.max(0, window.scrollY / max)) : 0;
}

/* Dedicated cut shot — a fixed, well-composed frame on the cake, computed in
   boat space at click time then frozen in world space. The cake keeps bobbing
   inside a camera that does not move at all. */

function armCutShot(t) {
  cutCam.active = true;
  cutCam.t0 = t;
  cutCam.w = 0;
  boat.updateWorldMatrix(true, false);
  // Off the beam and pulled back so the whole hull runs across frame under the
  // cake. Narrow windows have less horizontal FOV, so back off further there —
  // otherwise the bow and stern crop on portrait and squarish viewports.
  // Solve for the distance that fits the hull (half-length + margin) inside the
  // horizontal FOV, so the bow and stern never crop on a narrow window.
  const halfV = THREE.MathUtils.degToRad(camera.fov) / 2;
  const need = 3.1 / (Math.tan(halfV) * camera.aspect);
  const wide = Math.min(2.2, Math.max(1, need / 4.78));
  cutCam.pos.copy(
    boat.localToWorld(new THREE.Vector3(-0.62 * wide, 0.55 + 1.2 * wide, 4.62 * wide))
  );
  boat.updateWorldMatrix(true, false);
  cutCam.tgt.copy(boat.localToWorld(new THREE.Vector3(0, 0.52, 0)));
}
function cutShotWeight(t) {
  if (!cutCam.active) return 0;
  const e = t - cutCam.t0;
  if (e >= cutCam.hold) { cutCam.active = false; return 0; }
  const inW = smooth01(e / 0.6);
  const outW = 1 - smooth01((e - (cutCam.hold - 1.3)) / 1.3);
  return Math.max(0, Math.min(inW, outW));
}

const cutSeq = { state: "idle", t0: 0 };
const KNIFE_UP_POS = new THREE.Vector3(-0.196, 1.53, -0.1);
const KNIFE_UP_ROT = new THREE.Vector3(0, 2.67, -1.42);
/* The cut is a draw stroke, not a plunge: the blade enters high on one side of

const CUT_DIR = new THREE.Vector3(Math.cos(2.67), 0, -Math.sin(2.67)); // cut-group +x
const KNIFE_ENTRY = KNIFE_UP_POS.clone().addScaledVector(CUT_DIR, 0.46);
const KNIFE_EXIT = KNIFE_UP_POS.clone().addScaledVector(CUT_DIR, -0.46).setY(KNIFE_UP_POS.y - 0.42);
const KNIFE_CLEAR = KNIFE_EXIT.clone().addScaledVector(CUT_DIR, -0.24).setY(KNIFE_EXIT.y + 0.36);
window.addEventListener("pointerdown", () => {

function updateCutSeq(t) {
  if (cutSeq.state === "idle") return;
  const kn = boat.userData.knife;
  const cut = boat.userData.cut;
  const rp = kn.userData.restPos, rr = kn.userData.restRot;
  const e = t - cutSeq.t0;
  const adv = (next) => { cutSeq.state = next; cutSeq.t0 = t; };
  if (cutSeq.state === "lift") {
    // raise off the deck to the entry corner, blade turned down onto the cut line
    const k = smooth01(e / 0.8);
    kn.position.lerpVectors(rp, KNIFE_ENTRY, k);
    kn.rotation.set(
      rr.x + (KNIFE_UP_ROT.x - rr.x) * k,
      rr.y + (KNIFE_UP_ROT.y - rr.y) * k,
      rr.z + (KNIFE_UP_ROT.z - rr.z) * k
    );
    if (e >= 0.8) adv("slice");
  } else if (cutSeq.state === "slice") {
    // the draw stroke — across the cake and down through it at the same time
    const k = smooth01(e / 0.9);
    kn.position.lerpVectors(KNIFE_ENTRY, KNIFE_EXIT, k);
    kn.rotation.z = KNIFE_UP_ROT.z + 0.22 * k; // heel drops, tip trails
    if (e >= 0.9) {
      cut.slice.visible = cut.slitL.visible = cut.slitR.visible = true;
      fireworks.activeUntil = t + 15;
      fireworks.nextLaunch = t;
      document.body.classList.add("celebrate");
      adv("reveal");
    }
  } else if (cutSeq.state === "reveal") {
    const k = smooth01(e / 0.9);
    cut.slice.position.x = 0.92 * k;
    cut.slice.rotation.z = -0.1 * k;
    kn.position.lerpVectors(KNIFE_EXIT, KNIFE_CLEAR, k); // draw clear of the slice
    if (e >= 0.9) adv("return");
  } else if (cutSeq.state === "return") {
    const k = smooth01(e / 1.0);
    kn.position.lerpVectors(KNIFE_CLEAR, rp, k);
    kn.rotation.set(
      KNIFE_UP_ROT.x + (rr.x - KNIFE_UP_ROT.x) * k,
      KNIFE_UP_ROT.y + (rr.y - KNIFE_UP_ROT.y) * k,
      (KNIFE_UP_ROT.z + 0.22) + (rr.z - KNIFE_UP_ROT.z - 0.22) * k
    );
    if (e >= 1.0) adv("idle");
  }
}

function updateBricks(p) {
  const bk = lighthouse.userData.bricks;
  const L = bk.data.length;
  // wave that travels around the tower as the camera orbits it
  const camAz = Math.atan2(
    camera.position.z - lighthouse.position.z,
    camera.position.x - lighthouse.position.x
  );
  const band = smooth01((p - 0.18) / 0.1) * (1 - smooth01((p - 0.58) / 0.1));
  window.__dbgP = p; window.__dbgBand = band;
  for (let i = 0; i < L; i++) {
    const d = Math.atan2(Math.sin(bk.data[i].theta - camAz), Math.cos(bk.data[i].theta - camAz));
    bk.popTarget[i] = Math.pow(Math.max(Math.cos(d * 1.5), 0.0), 3.0) * band * 0.5;
  }
  // hover pop with neighbor falloff
  raycaster.setFromCamera(pointerNdc, camera);
  const hits = raycaster.intersectObject(bk.mesh);
  if (hits.length) {
    const hb = bk.data[hits[0].instanceId];
    for (let i = 0; i < L; i++) {
      const b = bk.data[i];
      const dy = b.y - hb.y;
      const da = Math.atan2(Math.sin(b.theta - hb.theta), Math.cos(b.theta - hb.theta)) * b.r;
      const h = Math.max(0, 1 - Math.sqrt(dy * dy + da * da) / 0.55);
      if (h > bk.popTarget[i]) bk.popTarget[i] = h;
    }
  }
  for (let i = 0; i < L; i++) {
    bk.popCur[i] += (bk.popTarget[i] - bk.popCur[i]) * 0.14;
    const b = bk.data[i];
    const pop = bk.popCur[i];
    bk.dummy.position.set(
      Math.cos(b.theta) * (b.r + pop * 0.22), b.y, Math.sin(b.theta) * (b.r + pop * 0.22)
    );
    bk.dummy.rotation.set(0, Math.PI / 2 - b.theta, 0);
    bk.dummy.scale.set(b.w, 1, 1);
    bk.dummy.updateMatrix();
    bk.mesh.setMatrixAt(i, bk.dummy.matrix);
    _brickColor.copy(bk.baseColors[i]).lerp(_brickGlow, Math.min(1, pop) * 0.8);
    bk.mesh.setColorAt(i, _brickColor);

  bk.mesh.instanceColor.needsUpdate = true;
}

    camTgt.lerp(cutCam.tgt, cw);

    document.body.classList.remove("cutting");
    document.body.classList.remove("celebrate");
  }
  camera.position.copy(camPos);
  camera.lookAt(camTgt);

  // uniforms
  skyMat.uniforms.time.value = t;
  stars.mat.uniforms.time.value = t;
  lanterns.mat.uniforms.time.value = t;
  candles.mat.uniforms.time.value = t;
  embers.mat.uniforms.time.value = t;
  if (water.material.uniforms.time) water.material.uniforms.time.value = t;

  // boat bob
  boat.position.y = 0.1 + Math.sin(t * 0.8) * 0.05;
  boat.rotation.z = Math.sin(t * 0.6) * 0.02;
  boat.rotation.x = Math.sin(t * 0.5 + 1.2) * 0.015;

  // candle flame flicker
  const fs = 0.9 + 0.08 * Math.sin(t * 9.7) + 0.05 * Math.sin(t * 15.3);
  boat.userData.flameMat.color.setRGB(fs, 0.87 * fs, 0.55 * fs);

  // cut-the-cake sequence + fireworks + knife hover glow
  updateCutSeq(t);
  updateFireworks(t, dt);
  if (cutSeq.state === "idle") {
    raycaster.setFromCamera(pointerNdc, camera);
    const overKnife = raycaster.intersectObject(boat.userData.knife, true).length > 0;
    boat.userData.bladeMat.emissive.setScalar(
      overKnife ? 0.18 + 0.08 * Math.sin(t * 6.0) : 0
    );
    if (overKnife !== knifeHover) {
      knifeHover = overKnife;
      document.body.classList.toggle("cursor-hover", knifeHover);
    }
  }

  // lighthouse beam sweep
  lighthouse.userData.beamGroup.rotation.y = t * 0.22;

  // brick pop: hover + orbit sweep
  updateBricks(p);

  updateDom(p);
  composer.render();

  if (window.__freezeAt !== undefined) {
    window.__pause = true;
    window.__freezeAt = undefined;
  }
  if (!firstFrame) { firstFrame = true; window.__firstFrame = true; }
}
tick();

/* ---------------- resize ---------------- */
window.addEventListener("resize", () => {
  const w = window.innerWidth, h = window.innerHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
  composer.setSize(w, h);
});

/* ============================================================
   UI layer
   ============================================================ */

/* preloader */
const plCount = document.getElementById("pl-count");
const plBar = document.getElementById("pl-bar");
let plValue = 0;
const plStart = performance.now();
function plTick() {
  const elapsed = performance.now() - plStart;
  plValue += (100 - plValue) * 0.045 + 0.25;
  if (plValue >= 100 || (elapsed > 1500 && window.__firstFrame)) plValue = Math.min(plValue, 100);
  const shown = Math.min(100, Math.floor(plValue));
  plCount.textContent = String(shown).padStart(2, "0");
  plBar.style.transform = `scaleX(${(shown / 100).toFixed(3)})`;
  if (shown >= 100 && elapsed > 1400 && window.__firstFrame) {
    openGate();
    return;
  }
  requestAnimationFrame(plTick);
}
plTick();
// hard fallback: never trap the user on the loader
setTimeout(openGate, 6000);

/* ============================================================
   Locked heart — the password gate.

   NOTE: this is a keepsake, not security. The word below sits in
   plain text in this file, so anyone who opens the page source can
   read it. Treat it as a sealed envelope, not a lock.
   ============================================================ */
const GATE_CODE = "1234"; // <-- change me

/* ---- build the pixel heart ---- */
const HEART_MASK = [
  "....XX....XX....",
  "...XXXX..XXXX...",
  "..XXXXXXXXXXXX..",
  ".XXXXXXXXXXXXXX.",
  "XXXXXXXXXXXXXXXX",
  "XXXXXXXXXXXXXXXX",
  "XXXXXXXXXXXXXXXX",
  ".XXXXXXXXXXXXXX.",
  "..XXXXXXXXXXXX..",
  "...XXXXXXXXXX...",
  "....XXXXXXXX....",
  ".....XXXXXX.....",
  "......XXXX......",
  ".......XX.......",
];
const PX_OUTLINE = "#9e2b4e";
const PX_FILL = "#ef5f8b";
const PX_SHADE = "#e04c79";
const PX_LIGHT = "#f9a7c1";
const HIGHLIGHTS = new Set(["1,10", "1,11", "2,11", "2,12", "3,12", "3,13"]);

const heartSvg = document.getElementById("heart-px");
const heartRects = [];
(function buildHeart() {
  if (!heartSvg) return;
  const at = (r, c) =>
    r >= 0 && r < HEART_MASK.length && c >= 0 && c < 16 ? HEART_MASK[r][c] : ".";
  const NS = "http://www.w3.org/2000/svg";
  for (let r = 0; r < HEART_MASK.length; r++) {
    for (let c = 0; c < 16; c++) {
      if (at(r, c) !== "X") continue;
      const edge =
        at(r - 1, c) !== "X" || at(r + 1, c) !== "X" ||
        at(r, c - 1) !== "X" || at(r, c + 1) !== "X";
      let fill = PX_FILL;
      if (edge) fill = PX_OUTLINE;
      else if (HIGHLIGHTS.has(r + "," + c)) fill = PX_LIGHT;
      else if (c < 5 && r > 6) fill = PX_SHADE; // soft shading, lower left
      const rect = document.createElementNS(NS, "rect");
      // hairline overlap kills seams between pixels on fractional scales
      rect.setAttribute("x", c);
      rect.setAttribute("y", r);
      rect.setAttribute("width", 1.02);
      rect.setAttribute("height", 1.02);
      rect.setAttribute("fill", fill);
      heartSvg.appendChild(rect);
      heartRects.push({ el: rect, r, c });
    }
  }
})();

/* ---- gate state ---- */
const gateEl = document.getElementById("gate");
const gateHint = document.getElementById("gate-hint");
const flashEl = document.getElementById("flash");
const slotsEl = document.getElementById("code-slots");
const numpadEl = document.getElementById("numpad");
let entered = "";
let gateShown = false;
let gatePassed = false;

function drawSlots() {
  if (!slotsEl) return;
  slotsEl.innerHTML = "";
  for (let i = 0; i < GATE_CODE.length; i++) {
    const dot = document.createElement("i");
    if (i < entered.length) dot.className = "on";
    slotsEl.appendChild(dot);
  }
}
drawSlots();

function openGate() {
  if (gateShown || gatePassed) return;
  gateShown = true;
  document.body.classList.add("gated");
  document.getElementById("preloader").style.transform = "translateY(-101%)";
}

function unlock() {
  if (gatePassed) return;
  gatePassed = true;
  // blow every pixel of the heart outward from its centre
  for (const p of heartRects) {
    const dx = p.c - 7.5, dy = p.r - 6;
    const d = Math.hypot(dx, dy) || 1;
    const push = 9 + Math.random() * 13;
    p.el.style.transform =
      `translate(${(dx / d) * push}px, ${(dy / d) * push - 3}px) rotate(${(Math.random() - 0.5) * 120}deg)`;
    p.el.style.transitionDelay = `${d * 0.012 + Math.random() * 0.05}s`;
  }
  document.body.classList.add("opening");
  flashEl.classList.add("blast");
  setTimeout(() => {
    document.body.classList.remove("gated", "opening");
    gateEl.style.display = "none";
    document.body.classList.add("ready"); // main animation starts here
  }, 780);
}

function wrongCode() {
  document.body.classList.remove("gate-wrong");
  void document.body.offsetWidth; // restart the shake
  document.body.classList.add("gate-wrong");
  gateHint.textContent = "not it — try again";
  setTimeout(() => {
    document.body.classList.remove("gate-wrong");
    entered = "";
    drawSlots();
  }, 620);
}

function press(k) {
  if (gatePassed || document.body.classList.contains("gate-wrong")) return;
  if (k === "del") entered = entered.slice(0, -1);
  else if (k === "clr") entered = "";
  else if (k === "go") {
    if (entered === GATE_CODE) return unlock();
    if (entered.length) return wrongCode();
    return;
  } else if (entered.length < GATE_CODE.length) {
    entered += k;
  }
  drawSlots();
  // full-length entry checks itself, so no Enter needed
  if (entered.length === GATE_CODE.length) {
    setTimeout(() => {
      if (gatePassed) return;
      if (entered === GATE_CODE) unlock();
      else wrongCode();
    }, 220);
  }
}

if (numpadEl) {
  numpadEl.addEventListener("click", (e) => {
    const btn = e.target.closest(".key");
    if (btn) press(btn.dataset.k);
  });
}
// physical keyboard works too
window.addEventListener("keydown", (e) => {
  if (!document.body.classList.contains("gated") || gatePassed) return;
  let k = null;
  if (/^[0-9]$/.test(e.key)) k = e.key;
  else if (e.key === "Backspace") k = "del";
  else if (e.key === "Enter") k = "go";
  else if (e.key === "Escape") k = "clr";
  if (!k) return;
  e.preventDefault();
  const btn = numpadEl && numpadEl.querySelector(`.key[data-k="${k}"]`);
  if (btn) {
    btn.classList.add("hit");
    setTimeout(() => btn.classList.remove("hit"), 110);
  }
  press(k);
});

/* custom cursor */
const dot = document.getElementById("cursor-dot");
const ring = document.getElementById("cursor-ring");
let cx = -100, cy = -100, rx = -100, ry = -100;
window.addEventListener("mousemove", (e) => { cx = e.clientX; cy = e.clientY; });
(function cursorTick() {
  requestAnimationFrame(cursorTick);
  rx += (cx - rx) * 0.16;
  ry += (cy - ry) * 0.16;
  dot.style.transform = `translate(${cx}px, ${cy}px) translate(-50%, -50%)`;
  ring.style.transform = `translate(${rx}px, ${ry}px) translate(-50%, -50%)`;
})();
document.querySelectorAll("a, button").forEach((el) => {
  el.addEventListener("mouseenter", () => document.body.classList.add("cursor-hover"));
  el.addEventListener("mouseleave", () => document.body.classList.remove("cursor-hover"));
});

/* scramble hover on nav links */
const GLYPHS = "!<>-_\\/[]{}—=+*^?#";
document.querySelectorAll("[data-scramble]").forEach((el) => {
  const original = el.textContent;
  let frame = 0, raf = null;
  el.addEventListener("mouseenter", () => {
    cancelAnimationFrame(raf);
    frame = 0;
    const total = original.length * 3;
    (function scram() {
      frame++;
      const reveal = Math.floor((frame / total) * original.length);
      let out = "";
      for (let i = 0; i < original.length; i++) {
        out += i < reveal
          ? original[i]
          : GLYPHS[(Math.random() * GLYPHS.length) | 0];
      }
      el.textContent = out;
      if (frame < total) raf = requestAnimationFrame(scram);
      else el.textContent = original;
    })();
  });
});

/* webgl context loss: reload gracefully */
canvas.addEventListener("webglcontextlost", (e) => {
  e.preventDefault();
  location.reload();
});
</script>
